<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="128" fill="#1e1e2e"/>

  <!-- Ticket stylisé -->
  <g transform="translate(128, 128)">
    <!-- Corps du ticket -->
    <rect x="40" y="64" width="224" height="192" rx="24" fill="#ff6b6b"/>

    <!-- Encoches du ticket -->
    <circle cx="40" cy="160" r="24" fill="#1e1e2e"/>
    <circle cx="264" cy="160" r="24" fill="#1e1e2e"/>

    <!-- Ligne pointillée centrale -->
    <line x1="64" y1="160" x2="240" y2="160" stroke="#1e1e2e" stroke-width="8" stroke-dasharray="16 12" opacity="0.3"/>

    <!-- Symbole "Miss" stylisé -->
    <path d="M96 112 L108 112 L132 148 L156 112 L168 112 L168 180 L156 180 L156 136 L132 172 L108 136 L108 180 L96 180 Z" fill="white"/>

    <!-- Points et lettres -->
    <circle cx="188" cy="124" r="8" fill="white"/>
    <rect x="182" y="140" width="12" height="40" rx="3" fill="white"/>

    <!-- Symbole "ss" -->
    <path d="M204 152 L196 144 Q192 140 200 140 L216 140 Q224 140 220 144 L212 152 Q208 156 216 156 L232 156 Q240 156 236 160 L228 168 Q224 172 232 172 L216 172 Q208 172 212 168 L204 152" fill="white"/>
  </g>

  <!-- Effet de brillance -->
  <circle cx="170" cy="170" r="220" fill="url(#gradient)" opacity="0.1"/>

  <defs>
    <radialGradient id="gradient" cx="0" cy="0" r="1">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
</svg>
