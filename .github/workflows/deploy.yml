# Déploiement délégué au reusable famille (dev-wpa-config) : Pages + Firebase.
# base path = '/' (vite.config le force) → use-base-path: false.
# Le job Firebase utilise le secret FIREBASE_SERVICE_ACCOUNT_KEY (secrets: inherit).
name: Deploy to GitHub Pages & Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  packages: read

jobs:
  deploy:
    uses: mister-guiiug/dev-wpa-config/.github/workflows/pwa-deploy.yml@v1
    secrets: inherit
    with:
      use-base-path: false
      firebase-project: miss-ticket
      firebase-only: firestore:rules,firestore:indexes
